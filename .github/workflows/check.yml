name: Check

on:
  push:
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore misskey-meilisearch-reindex.csproj

      - name: Build
        run: dotnet build misskey-meilisearch-reindex.csproj --configuration Release --no-restore
